<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Grid</title>

<style>
body{
    margin:0;
    background:#222;
    font-family:sans-serif;
}

/* Center the grid */
.container{
    width: fit-content;
    margin: 0 auto;
    padding: 16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 250px);
    gap:4px;
}

.tile{
    position:relative;
    overflow:hidden;
    border-radius:12px;
}

.tile video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
</style>
</head>
<body>
<div class="container">
<div class="grid">

    <div class="tile">
        <video muted loop playsinline preload="metadata">
            <source src="Videos/RIGHT.mp4" type="video/mp4">
        </video>
    </div>

    <div class="tile">
        <video muted loop playsinline preload="metadata">
            <source src="Videos/CENTER.mp4" type="video/mp4">
        </video>
    </div>

    <div class="tile">
        <video muted loop playsinline preload="metadata">
            <source src="Videos/LEFT.mp4" type="video/mp4">
        </video>
    </div>

    <div class="tile">
        <video muted loop playsinline preload="metadata">
            <source src="Videos/Wallpapper_5.mp4" type="video/mp4">
        </video>
    </div>

    <div class="tile">
        <video muted loop playsinline preload="metadata">
            <source src="Videos/Wallpapper_6.mp4" type="video/mp4">
        </video>
    </div>

</div>
</div>


<script>
const videos = document.querySelectorAll("video");

// Set tile aspect ratio from video resolution
videos.forEach(video => {

    video.addEventListener("loadedmetadata", () => {

        const ratio = video.videoWidth / video.videoHeight;

        video.parentElement.style.aspectRatio = ratio;
    });

});

// Play only visible videos
const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        const video = entry.target;

        if(entry.isIntersecting){
            video.play().catch(()=>{});
        }
        else{
            video.pause();
        }

    });

},{
    threshold:0.25
});

videos.forEach(video => observer.observe(video));
</script>

</body>
</html>
